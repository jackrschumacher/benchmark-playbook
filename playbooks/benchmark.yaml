- name: Install benchmarking tools
  hosts: machines
  connection: local
  gather_facts: yes
  become: yes
  vars:
    target_user: "{{ ansible_user | default(ansible_facts['user_id']) }}"
    downloads_folder: "/home/{{ target_user }}/Downloads"
    
    geekbench_version: "6.5.0"
    # Dynamically select the correct URL based on the CPU architecture using modern facts
    geekbench_url: >-
      {% if ansible_facts['architecture'] == 'aarch64' %}
      https://cdn.geekbench.com/Geekbench-{{ geekbench_version }}-LinuxARMPreview.tar.gz
      {% else %}
      https://cdn.geekbench.com/Geekbench-{{ geekbench_version }}-Linux.tar.gz
      {% endif %}
      
    geekbench_dir: "{{ downloads_folder }}/geekbench"
    
    sbc_bench_url: "https://raw.githubusercontent.com/ThomasKaiser/sbc-bench/master/sbc-bench.sh"
    sbc_bench_dir: "{{ downloads_folder }}/sbc-bench"

  tasks:
    - name: Ensure required base dependencies are installed
      package:
        name:
          - tar
          - gzip
          - curl
          - wget
        state: present

    # ==========================================
    # Task Block 1: Geekbench
    # ==========================================
    # Clean up the old directory in case it still has the broken x86 files inside
    - name: Remove old Geekbench directory
      file:
        path: "{{ geekbench_dir }}"
        state: absent

    - name: Create Geekbench directory
      file:
        path: "{{ geekbench_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ target_user }}"

    - name: Download and extract Geekbench
      unarchive:
        src: "{{ geekbench_url }}"
        dest: "{{ geekbench_dir }}"
        remote_src: yes
        extra_opts: 
          - --strip-components=1
        owner: "{{ target_user }}"

    - name: Run Geekbench
      command: "./geekbench6"
      args:
        chdir: "{{ geekbench_dir }}"
      register: geekbench_result
      async: 1800
      poll: 30

    - name: Display Geekbench Results
      debug:
        var: geekbench_result.stdout_lines

    # ==========================================
    # Task Block 2: sbc-bench
    # ==========================================
    - name: Create sbc-bench directory
      file:
        path: "{{ sbc_bench_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ target_user }}"

    - name: Download sbc-bench script
      get_url:
        url: "{{ sbc_bench_url }}"
        dest: "{{ sbc_bench_dir }}/sbc-bench.sh"
        mode: '0755'
        owner: "{{ target_user }}"

    - name: Run sbc-bench
      command: "./sbc-bench.sh -r"
      args:
        chdir: "{{ sbc_bench_dir }}"
      register: sbc_bench_result
      async: 3600
      poll: 60

    - name: Display sbc-bench Results
      debug:
        var: sbc_bench_result.stdout_lines

    # ==========================================
    # Task Block 3: Save Output
    # ==========================================
    - name: Save sbc-bench results to a text file
      copy:
        content: "{{ sbc_bench_result.stdout }}"
        dest: "{{ sbc_bench_dir }}/sbc_bench_results.txt"
        owner: "{{ target_user }}"
        mode: '0644'